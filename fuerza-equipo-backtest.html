<body>

<!--
============================================================
PRÓLOGO — fuerza-equipo-backtest.html
============================================================
QUÉ ES:
  Herramienta de auditoría que corre un backtest juego por juego
  sobre el histórico disponible.

  Mide si distintas señales de fuerza de equipo habrían anticipado
  correctamente al ganador de cada partido usando únicamente datos
  anteriores a ese juego.

  Esta versión agrega una medición específica de ÚLTIMOS 6 para
  compararla contra Últimos 5 y Últimos 10.

  No es un motor de predicción.
  No fija pesos.
  No modifica fuerza-equipo.js.
  No conecta Moneyline.

DEPENDENCIAS:
  1. mlbpro-core.js
  2. fuerza-equipo.js

ORDEN OBLIGATORIO:
  <script src="mlbpro-core.js"></script>
  <script src="fuerza-equipo.js"></script>

BLINDAJE HISTÓRICO:
  Para cada juego se llama:

    calcularFuerzaEquipo(
      juego.home,
      juego.away,
      fechaDelJuego
    )

  fuerza-equipo.js excluye todo juego con fecha igual o posterior
  a la fecha de corte.

  Por lo tanto quedan fuera:
    - el juego evaluado;
    - juegos posteriores;
    - otros juegos de ese mismo día;
    - el segundo partido de un doubleheader del mismo día.

SEÑALES INDIVIDUALES:
  1. Porcentaje de victorias general.
  2. Últimos 5.
  3. Últimos 6.
  4. Últimos 10.
  5. Récord local del home contra récord visitante del away.
  6. Diferencial promedio de carreras crudo.
  7. Promedio anotadas menos promedio permitidas redondeado.

CÓMO SE CALCULA ÚLTIMOS 6:
  fuerza-equipo.js devuelve el historial agregado y los últimos 10,
  pero no expone directamente los resultados individuales necesarios
  para reconstruir exactamente una ventana de 6.

  Por eso este backtest calcula Últimos 6 directamente desde la misma
  caché histórica, usando exclusivamente juegos anteriores a la fecha
  evaluada, con los mismos nombres exactos de equipo y sin usar juegos
  del mismo día ni posteriores.

CORRECCIÓN DEL DOBLE VOTO:
  Las dos señales de diferencial de carreras representan
  prácticamente el mismo dato.

  Ambas permanecen visibles en la tabla individual.

  Las combinaciones usan solamente el diferencial crudo para evitar
  doble voto oculto.

COMBINACIONES:
  A. Unanimidad de 6 señales independientes:
       porcentaje general,
       últimos 5,
       últimos 6,
       últimos 10,
       récord local/visitante,
       diferencial crudo.

  B. Mayoría simple de esas mismas 6 señales independientes.

  C. Forma reciente original:
       últimos 5 + últimos 10 + récord local/visitante.

  D. Forma reciente con Últimos 6:
       últimos 6 + últimos 10 + récord local/visitante.

  E. Ventanas recientes:
       últimos 5 + últimos 6 + últimos 10.

QUÉ TOCA:
  - Lee el histórico solo mediante MLBPRO_CORE.
  - No toca localStorage directamente.
  - No escribe caché.
  - No modifica ningún archivo.
  - No conecta Moneyline, Coincidencia, F5, K6 ni clima.

RENDIMIENTO:
  calcularFuerzaEquipo vuelve a recorrer el histórico para cada juego,
  por lo que el proceso es O(n²).

  Últimos 6 también recorre el histórico para obtener los seis juegos
  previos de cada equipo.

  El campo de límite permite evaluar solo los juegos más recientes,
  pero no cambia el historial permitido para cada perfil.
============================================================
-->

<h1>Backtest de señales — Fuerza de Equipo</h1>

<p>
  Compara Últimos 5, Últimos 6 y Últimos 10 usando exclusivamente
  información anterior a la fecha de cada partido.
</p>

<label for="inpLimite">
  Límite de juegos a evaluar
  (vacío = todo el histórico):
</label>

<input
  type="text"
  id="inpLimite"
  placeholder="Ej: 500"
  style="width: 140px;"
>

<br>

<button type="button" onclick="ejecutarBacktest()">
  Correr backtest
</button>

<div id="resumenGeneral"></div>
<div id="tablaSenales"></div>
<div id="tablaCombos"></div>
<div id="log"></div>

<script src="mlbpro-core.js"></script>
<script src="fuerza-equipo.js"></script>

<script>
(function () {
  "use strict";

  const SENAL_PORCENTAJE_GENERAL =
    "Porcentaje de victorias general";

  const SENAL_ULTIMOS_5 =
    "Últimos 5";

  const SENAL_ULTIMOS_6 =
    "Últimos 6";

  const SENAL_ULTIMOS_10 =
    "Últimos 10";

  const SENAL_RECORD_LV =
    "Récord local/visitante correspondiente";

  const SENAL_DIFERENCIAL_CRUDO =
    "Diferencial promedio de carreras (crudo)";

  const SENAL_PROMEDIO_REDONDEADO =
    "Promedio anotadas − promedio permitidas (redondeado)";

  function esFechaISOValida(fecha) {
    if (typeof fecha !== "string") {
      return false;
    }

    const match =
      /^(\d{4})-(\d{2})-(\d{2})$/.exec(fecha);

    if (!match) {
      return false;
    }

    const year = Number(match[1]);
    const month = Number(match[2]);
    const day = Number(match[3]);

    const date =
      new Date(Date.UTC(year, month - 1, day));

    return (
      date.getUTCFullYear() === year &&
      date.getUTCMonth() === month - 1 &&
      date.getUTCDate() === day
    );
  }

  function fechaDeFila(row) {
    const raw = row?.date;

    if (
      typeof raw !== "string" ||
      raw.length < 10
    ) {
      return null;
    }

    const fecha =
      raw.slice(0, 10);

    return esFechaISOValida(fecha)
      ? fecha
      : null;
  }

  function gamePkNumerico(row) {
    const gamePk =
      Number(row?.gamePk);

    return Number.isFinite(gamePk)
      ? gamePk
      : null;
  }

  function filaValida(row) {
    if (
      !row ||
      typeof row !== "object"
    ) {
      return false;
    }

    if (
      typeof row.home !== "string" ||
      row.home.trim().length === 0
    ) {
      return false;
    }

    if (
      typeof row.away !== "string" ||
      row.away.trim().length === 0
    ) {
      return false;
    }

    if (!Number.isFinite(row.homeRuns)) {
      return false;
    }

    if (!Number.isFinite(row.awayRuns)) {
      return false;
    }

    if (row.homeRuns === row.awayRuns) {
      return false;
    }

    return fechaDeFila(row) !== null;
  }

  function ordenarFilasCronologicamente(filas) {
    return filas
      .map(function (row, indiceOriginal) {
        return {
          row: row,
          indiceOriginal: indiceOriginal
        };
      })
      .sort(function (a, b) {
        const fechaA =
          fechaDeFila(a.row);

        const fechaB =
          fechaDeFila(b.row);

        if (fechaA !== fechaB) {
          return fechaA < fechaB
            ? -1
            : 1;
        }

        const gamePkA =
          gamePkNumerico(a.row);

        const gamePkB =
          gamePkNumerico(b.row);

        if (
          gamePkA !== null &&
          gamePkB !== null &&
          gamePkA !== gamePkB
        ) {
          return gamePkA - gamePkB;
        }

        if (
          gamePkA !== null &&
          gamePkB === null
        ) {
          return -1;
        }

        if (
          gamePkA === null &&
          gamePkB !== null
        ) {
          return 1;
        }

        return (
          a.indiceOriginal -
          b.indiceOriginal
        );
      })
      .map(function (item) {
        return item.row;
      });
  }

  function calcularVentanaEquipo(
    equipo,
    fechaCorte,
    cantidad,
    filasHistorico
  ) {
    if (
      typeof equipo !== "string" ||
      equipo.trim().length === 0
    ) {
      return null;
    }

    const nombreEquipo =
      equipo.trim();

    const juegosEquipo =
      filasHistorico.filter(function (row) {
        if (!filaValida(row)) {
          return false;
        }

        const participa =
          row.home === nombreEquipo ||
          row.away === nombreEquipo;

        if (!participa) {
          return false;
        }

        const fecha =
          fechaDeFila(row);

        return fecha < fechaCorte;
      });

    const ordenados =
      ordenarFilasCronologicamente(
        juegosEquipo
      );

    const ultimos =
      ordenados.slice(-cantidad);

    if (ultimos.length === 0) {
      return null;
    }

    let ganados = 0;
    let perdidos = 0;

    for (const row of ultimos) {
      const esLocal =
        row.home === nombreEquipo;

      const anotadas =
        esLocal
          ? row.homeRuns
          : row.awayRuns;

      const permitidas =
        esLocal
          ? row.awayRuns
          : row.homeRuns;

      if (anotadas > permitidas) {
        ganados++;
      } else {
        perdidos++;
      }
    }

    return {
      juegos: ultimos.length,
      ganados: ganados,
      perdidos: perdidos,
      porcentaje:
        ganados / ultimos.length
    };
  }

  const SENALES = [
    {
      nombre: SENAL_PORCENTAJE_GENERAL,

      valor: function (perfil) {
        return Number.isFinite(
          perfil.porcentaje_victorias
        )
          ? perfil.porcentaje_victorias
          : null;
      }
    },

    {
      nombre: SENAL_ULTIMOS_5,

      valor: function (perfil) {
        const ultimos =
          perfil.ultimos_5;

        if (
          !ultimos ||
          ultimos.juegos === 0 ||
          !Number.isFinite(ultimos.ganados)
        ) {
          return null;
        }

        return (
          ultimos.ganados /
          ultimos.juegos
        );
      }
    },

    {
      nombre: SENAL_ULTIMOS_6,

      valorEspecial: true
    },

    {
      nombre: SENAL_ULTIMOS_10,

      valor: function (perfil) {
        const ultimos =
          perfil.ultimos_10;

        if (
          !ultimos ||
          ultimos.juegos === 0 ||
          !Number.isFinite(ultimos.ganados)
        ) {
          return null;
        }

        return (
          ultimos.ganados /
          ultimos.juegos
        );
      }
    },

    {
      nombre: SENAL_RECORD_LV,

      valorHome: function (perfil) {
        const record =
          perfil.record_local;

        if (
          !record ||
          record.juegos === 0 ||
          !Number.isFinite(record.ganados)
        ) {
          return null;
        }

        return (
          record.ganados /
          record.juegos
        );
      },

      valorAway: function (perfil) {
        const record =
          perfil.record_visitante;

        if (
          !record ||
          record.juegos === 0 ||
          !Number.isFinite(record.ganados)
        ) {
          return null;
        }

        return (
          record.ganados /
          record.juegos
        );
      }
    },

    {
      nombre: SENAL_DIFERENCIAL_CRUDO,

      valor: function (perfil) {
        if (
          !Number.isFinite(
            perfil.diferencial_carreras
          ) ||
          !Number.isFinite(
            perfil.juegos_totales
          ) ||
          perfil.juegos_totales <= 0
        ) {
          return null;
        }

        return (
          perfil.diferencial_carreras /
          perfil.juegos_totales
        );
      }
    },

    {
      nombre: SENAL_PROMEDIO_REDONDEADO,

      valor: function (perfil) {
        if (
          !Number.isFinite(
            perfil.promedio_anotadas
          ) ||
          !Number.isFinite(
            perfil.promedio_permitidas
          )
        ) {
          return null;
        }

        return (
          perfil.promedio_anotadas -
          perfil.promedio_permitidas
        );
      }
    }
  ];

  const NOMBRES_SENALES_COMBINABLES = [
    SENAL_PORCENTAJE_GENERAL,
    SENAL_ULTIMOS_5,
    SENAL_ULTIMOS_6,
    SENAL_ULTIMOS_10,
    SENAL_RECORD_LV,
    SENAL_DIFERENCIAL_CRUDO
  ];

  const NOMBRES_FORMA_ORIGINAL = [
    SENAL_ULTIMOS_5,
    SENAL_ULTIMOS_10,
    SENAL_RECORD_LV
  ];

  const NOMBRES_FORMA_CON_6 = [
    SENAL_ULTIMOS_6,
    SENAL_ULTIMOS_10,
    SENAL_RECORD_LV
  ];

  const NOMBRES_VENTANAS_RECIENTES = [
    SENAL_ULTIMOS_5,
    SENAL_ULTIMOS_6,
    SENAL_ULTIMOS_10
  ];

  function valorSenalHome(
    senal,
    perfilHome
  ) {
    if (
      typeof senal.valorHome ===
      "function"
    ) {
      return senal.valorHome(
        perfilHome
      );
    }

    if (
      typeof senal.valor ===
      "function"
    ) {
      return senal.valor(
        perfilHome
      );
    }

    return null;
  }

  function valorSenalAway(
    senal,
    perfilAway
  ) {
    if (
      typeof senal.valorAway ===
      "function"
    ) {
      return senal.valorAway(
        perfilAway
      );
    }

    if (
      typeof senal.valor ===
      "function"
    ) {
      return senal.valor(
        perfilAway
      );
    }

    return null;
  }

  function predecir(
    valorHome,
    valorAway
  ) {
    if (
      !Number.isFinite(valorHome) ||
      !Number.isFinite(valorAway)
    ) {
      return null;
    }

    if (valorHome === valorAway) {
      return null;
    }

    return valorHome > valorAway
      ? "home"
      : "away";
  }

  function nuevoContador() {
    return {
      juegos_evaluados: 0,
      aciertos: 0,
      fallos: 0,
      empates_sin_senal: 0
    };
  }

  function registrar(
    contador,
    prediccion,
    ganadorReal
  ) {
    contador.juegos_evaluados++;

    if (prediccion === null) {
      contador.empates_sin_senal++;
      return;
    }

    if (prediccion === ganadorReal) {
      contador.aciertos++;
    } else {
      contador.fallos++;
    }
  }

  function porcentajeAcierto(
    contador
  ) {
    const decididos =
      contador.aciertos +
      contador.fallos;

    if (decididos === 0) {
      return null;
    }

    return +(
      contador.aciertos /
      decididos *
      100
    ).toFixed(1);
  }

  function porcentajeCobertura(
    contador
  ) {
    if (
      contador.juegos_evaluados === 0
    ) {
      return null;
    }

    const decididos =
      contador.aciertos +
      contador.fallos;

    return +(
      decididos /
      contador.juegos_evaluados *
      100
    ).toFixed(1);
  }

  function votoMayoria(
    predicciones
  ) {
    const validas =
      predicciones.filter(
        function (prediccion) {
          return prediccion !== null;
        }
      );

    if (validas.length === 0) {
      return null;
    }

    const votosHome =
      validas.filter(
        function (prediccion) {
          return prediccion === "home";
        }
      ).length;

    const votosAway =
      validas.filter(
        function (prediccion) {
          return prediccion === "away";
        }
      ).length;

    if (votosHome === votosAway) {
      return null;
    }

    return votosHome > votosAway
      ? "home"
      : "away";
  }

  function log(mensaje) {
    const elemento =
      document.getElementById("log");

    elemento.textContent +=
      mensaje +
      "\n";
  }

  function ejecutarBacktest() {
    document.getElementById(
      "log"
    ).textContent = "";

    document.getElementById(
      "resumenGeneral"
    ).innerHTML = "";

    document.getElementById(
      "tablaSenales"
    ).innerHTML = "";

    document.getElementById(
      "tablaCombos"
    ).innerHTML = "";

    if (
      typeof window.MLBPRO_CORE ===
        "undefined" ||
      typeof window.MLBPRO_CORE
        .leerHistoricoCache !==
        "function"
    ) {
      document.getElementById(
        "resumenGeneral"
      ).innerHTML =
        '<div class="bloque">' +
        '<p class="no">' +
        'ERROR: mlbpro-core.js no cargó o no expone leerHistoricoCache().' +
        '</p>' +
        '</div>';

      return;
    }

    if (
      typeof window
        .calcularFuerzaEquipo !==
      "function"
    ) {
      document.getElementById(
        "resumenGeneral"
      ).innerHTML =
        '<div class="bloque">' +
        '<p class="no">' +
        'ERROR: fuerza-equipo.js no cargó o no expone calcularFuerzaEquipo().' +
        '</p>' +
        '</div>';

      return;
    }

    let filas;

    try {
      filas =
        window.MLBPRO_CORE
          .leerHistoricoCache();
    } catch (error) {
      filas = [];

      log(
        "Error leyendo histórico: " +
        (
          error?.message ||
          String(error)
        )
      );
    }

    if (!Array.isArray(filas)) {
      filas = [];
    }

    const filasValidas =
      ordenarFilasCronologicamente(
        filas.filter(filaValida)
      );

    const limiteTexto =
      document
        .getElementById("inpLimite")
        .value
        .trim();

    let juegosParaEvaluar =
      filasValidas;

    if (limiteTexto !== "") {
      const limite =
        Number(limiteTexto);

      if (
        Number.isFinite(limite) &&
        limite > 0
      ) {
        juegosParaEvaluar =
          filasValidas.slice(
            -Math.floor(limite)
          );
      }
    }

    const contadoresSenal = {};

    for (const senal of SENALES) {
      contadoresSenal[
        senal.nombre
      ] = nuevoContador();
    }

    const contadoresCombo = {
      "Unanimidad (6 señales independientes)":
        nuevoContador(),

      "Mayoría simple (6 señales independientes)":
        nuevoContador(),

      "Forma original (últimos5 + últimos10 + récord L/V)":
        nuevoContador(),

      "Forma con últimos6 (últimos6 + últimos10 + récord L/V)":
        nuevoContador(),

      "Ventanas recientes (últimos5 + últimos6 + últimos10)":
        nuevoContador()
    };

    let juegosProcesados = 0;
    let juegosSinHistorialSuficiente = 0;
    let juegosConError = 0;

    for (
      const row of
      juegosParaEvaluar
    ) {
      const fechaCorte =
        fechaDeFila(row);

      const ganadorReal =
        row.homeRuns >
        row.awayRuns
          ? "home"
          : "away";

      let resultado;

      try {
        resultado =
          window
            .calcularFuerzaEquipo(
              row.home,
              row.away,
              fechaCorte
            );
      } catch (error) {
        juegosConError++;

        log(
          "Error evaluando " +
          row.away +
          " @ " +
          row.home +
          " (" +
          fechaCorte +
          "): " +
          (
            error?.message ||
            String(error)
          )
        );

        continue;
      }

      if (
        !resultado ||
        !resultado.confirmado ||
        !resultado.home ||
        !resultado.away
      ) {
        juegosSinHistorialSuficiente++;
        continue;
      }

      juegosProcesados++;

      const ventana6Home =
        calcularVentanaEquipo(
          row.home,
          fechaCorte,
          6,
          filasValidas
        );

      const ventana6Away =
        calcularVentanaEquipo(
          row.away,
          fechaCorte,
          6,
          filasValidas
        );

      const predicciones = [];

      for (const senal of SENALES) {
        let valorHome = null;
        let valorAway = null;

        if (
          senal.nombre ===
          SENAL_ULTIMOS_6
        ) {
          valorHome =
            ventana6Home &&
            Number.isFinite(
              ventana6Home.porcentaje
            )
              ? ventana6Home.porcentaje
              : null;

          valorAway =
            ventana6Away &&
            Number.isFinite(
              ventana6Away.porcentaje
            )
              ? ventana6Away.porcentaje
              : null;
        } else {
          valorHome =
            valorSenalHome(
              senal,
              resultado.home
            );

          valorAway =
            valorSenalAway(
              senal,
              resultado.away
            );
        }

        const prediccion =
          predecir(
            valorHome,
            valorAway
          );

        registrar(
          contadoresSenal[
            senal.nombre
          ],
          prediccion,
          ganadorReal
        );

        predicciones.push({
          nombre: senal.nombre,
          prediccion: prediccion
        });
      }

      const prediccionesCombinables =
        predicciones
          .filter(function (item) {
            return NOMBRES_SENALES_COMBINABLES
              .includes(item.nombre);
          })
          .map(function (item) {
            return item.prediccion;
          });

      let prediccionUnanimidad =
        null;

      if (
        prediccionesCombinables
          .length === 6 &&
        prediccionesCombinables
          .every(function (prediccion) {
            return prediccion === "home";
          })
      ) {
        prediccionUnanimidad =
          "home";
      } else if (
        prediccionesCombinables
          .length === 6 &&
        prediccionesCombinables
          .every(function (prediccion) {
            return prediccion === "away";
          })
      ) {
        prediccionUnanimidad =
          "away";
      }

      registrar(
        contadoresCombo[
          "Unanimidad (6 señales independientes)"
        ],
        prediccionUnanimidad,
        ganadorReal
      );

      registrar(
        contadoresCombo[
          "Mayoría simple (6 señales independientes)"
        ],
        votoMayoria(
          prediccionesCombinables
        ),
        ganadorReal
      );

      const prediccionesFormaOriginal =
        predicciones
          .filter(function (item) {
            return NOMBRES_FORMA_ORIGINAL
              .includes(item.nombre);
          })
          .map(function (item) {
            return item.prediccion;
          });

      registrar(
        contadoresCombo[
          "Forma original (últimos5 + últimos10 + récord L/V)"
        ],
        votoMayoria(
          prediccionesFormaOriginal
        ),
        ganadorReal
      );

      const prediccionesFormaCon6 =
        predicciones
          .filter(function (item) {
            return NOMBRES_FORMA_CON_6
              .includes(item.nombre);
          })
          .map(function (item) {
            return item.prediccion;
          });

      registrar(
        contadoresCombo[
          "Forma con últimos6 (últimos6 + últimos10 + récord L/V)"
        ],
        votoMayoria(
          prediccionesFormaCon6
        ),
        ganadorReal
      );

      const prediccionesVentanas =
        predicciones
          .filter(function (item) {
            return NOMBRES_VENTANAS_RECIENTES
              .includes(item.nombre);
          })
          .map(function (item) {
            return item.prediccion;
          });

      registrar(
        contadoresCombo[
          "Ventanas recientes (últimos5 + últimos6 + últimos10)"
        ],
        votoMayoria(
          prediccionesVentanas
        ),
        ganadorReal
      );
    }

    renderResumenGeneral(
      filas.length,
      filasValidas.length,
      juegosParaEvaluar.length,
      juegosProcesados,
      juegosSinHistorialSuficiente,
      juegosConError
    );

    renderTablaSenales(
      contadoresSenal
    );

    renderTablaCombos(
      contadoresCombo
    );
  }

  function renderResumenGeneral(
    totalCache,
    totalValidas,
    totalConsideradas,
    procesados,
    sinHistorial,
    conError
  ) {
    document.getElementById(
      "resumenGeneral"
    ).innerHTML = `
      <div class="bloque">
        <p>
          Filas totales en caché:
          ${totalCache}
        </p>

        <p>
          Filas estructuralmente válidas:
          ${totalValidas}
        </p>

        <p>
          Juegos considerados según límite:
          ${totalConsideradas}
        </p>

        <p class="ok">
          Juegos evaluados con perfiles confirmados:
          ${procesados}
        </p>

        <p class="warn">
          Juegos descartados por falta de historial previo:
          ${sinHistorial}
        </p>

        <p class="${conError > 0 ? "no" : "ok"}">
          Juegos con error de ejecución:
          ${conError}
        </p>
      </div>
    `;
  }

  function renderTablaSenales(
    contadores
  ) {
    let filasHtml = "";

    for (const senal of SENALES) {
      const contador =
        contadores[senal.nombre];

      const acierto =
        porcentajeAcierto(
          contador
        );

      const cobertura =
        porcentajeCobertura(
          contador
        );

      filasHtml += `
        <tr>
          <td>${senal.nombre}</td>
          <td>${contador.juegos_evaluados}</td>
          <td>${contador.aciertos}</td>
          <td>${contador.fallos}</td>
          <td>${contador.empates_sin_senal}</td>
          <td>
            ${acierto === null ? "N/D" : acierto + "%"}
          </td>
          <td>
            ${cobertura === null ? "N/D" : cobertura + "%"}
          </td>
        </tr>
      `;
    }

    document.getElementById(
      "tablaSenales"
    ).innerHTML = `
      <h2>Señales individuales</h2>

      <table>
        <thead>
          <tr>
            <th>Señal</th>
            <th>Juegos</th>
            <th>Aciertos</th>
            <th>Fallos</th>
            <th>Sin señal</th>
            <th>% acierto</th>
            <th>% cobertura</th>
          </tr>
        </thead>

        <tbody>
          ${filasHtml}
        </tbody>
      </table>
    `;
  }

  function renderTablaCombos(
    contadores
  ) {
    let filasHtml = "";

    for (
      const nombre of
      Object.keys(contadores)
    ) {
      const contador =
        contadores[nombre];

      const acierto =
        porcentajeAcierto(
          contador
        );

      const cobertura =
        porcentajeCobertura(
          contador
        );

      filasHtml += `
        <tr>
          <td>${nombre}</td>
          <td>${contador.juegos_evaluados}</td>
          <td>${contador.aciertos}</td>
          <td>${contador.fallos}</td>
          <td>${contador.empates_sin_senal}</td>
          <td>
            ${acierto === null ? "N/D" : acierto + "%"}
          </td>
          <td>
            ${cobertura === null ? "N/D" : cobertura + "%"}
          </td>
        </tr>
      `;
    }

    document.getElementById(
      "tablaCombos"
    ).innerHTML = `
      <h2>
        Combinaciones simples
        (sin pesos, solo votos)
      </h2>

      <table>
        <thead>
          <tr>
            <th>Combinación</th>
            <th>Juegos</th>
            <th>Aciertos</th>
            <th>Fallos</th>
            <th>Sin señal</th>
            <th>% acierto</th>
            <th>% cobertura</th>
          </tr>
        </thead>

        <tbody>
          ${filasHtml}
        </tbody>
      </table>
    `;
  }

  window.ejecutarBacktest =
    ejecutarBacktest;
})();
</script>
