<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MLBPro · Coincidencia climática</title>
<style>
body{background:#000;color:#e8e8e8;font-family:-apple-system,system-ui,sans-serif;margin:0;padding:16px}
h1{font-size:18px;color:#f5c518;margin:0 0 4px}
.sub{color:#888;font-size:13px;margin-bottom:12px}
button{width:100%;padding:15px;margin:6px 0;font-size:15px;font-weight:800;color:#000;background:#f5c518;border:none;border-radius:12px}
button:disabled{opacity:.5}
#estado{margin:12px 0;font-size:13px;color:#9ad}
.juego{border:1px solid #333;border-radius:12px;padding:14px;margin-bottom:12px;background:#0c0c0c}
.matchup{font-size:16px;font-weight:800;color:#fff}
.estadio{font-size:13px;color:#bbb;margin:3px 0 8px}
.meta{font-size:13px;color:#ddd;margin:4px 0}
.ok{color:#32d74b;font-weight:800}
.mid{color:#ffd60a;font-weight:800}
.bad{color:#ff453a;font-weight:800}
.small{font-size:12px;color:#aaa;margin-top:5px}
.match{margin-top:8px;padding:8px;border-radius:8px;background:#111;border:1px solid #333}
.hist{margin-top:8px;border-top:1px solid #222;padding-top:8px}
</style>
<link rel="stylesheet" href="style.css">
</head>

<body>
<h1>MLBPro · Coincidencia climática</h1>
<div class="sub">Data Madre 2026 · Caja de Pandora</div>

<button onclick="jalarJuegosHoy()">JALAR JUEGOS DE HOY</button>
<button onclick="jalarHistorico2026()">JALAR HISTÓRICO 2026</button>
<button onclick="calcularCoincidencia()">CALCULAR COINCIDENCIA</button>
<button onclick="generarConclusionCoincidencia()">CONCLUSIÓN DE COINCIDENCIA</button>

<div id="estado">Listo.</div>
<div id="lista"></div>

<script>
const PROXY="https://mlb-score-proxy.jip0512.workers.dev/?url=";
const MLB_BASE="https://statsapi.mlb.com/api/v1";
const START_HIST="2026-03-26";
const CACHE_HIST="MLBPRO_DATA_MADRE_HIST_2026_V1";

let juegosHoy=[];
let climaHoy={};
let historico2026=[];

function viaProxy(url){
  return PROXY + encodeURIComponent(url);
}

function hoyISO(){
  const d=new Date();
  return d.toISOString().slice(0,10);
}

function ayerISO(){
  const d=new Date();
  d.setDate(d.getDate()-1);
  return d.toISOString().slice(0,10);
}

function addDays(dateISO,n){
  const d=new Date(dateISO+"T12:00:00");
  d.setDate(d.getDate()+n);
  return d.toISOString().slice(0,10);
}

function setEstado(t){
  document.getElementById("estado").textContent=t;
}

function render(html){
  document.getElementById("lista").innerHTML=html;
}

function safe(x){
  return Number.isFinite(Number(x)) ? Number(x) : "NO";
}

async function fetchJSON(url){
  const r=await fetch(url);
  if(!r.ok) throw new Error("HTTP "+r.status);
  return await r.json();
}

async function scheduleByDate(dateISO){
  const url=viaProxy(`${MLB_BASE}/schedule?sportId=1&date=${dateISO}&hydrate=venue`);
  const j=await fetchJSON(url);
  return j.dates?.[0]?.games || [];
}

async function getVenueFull(venueId){
  const url=viaProxy(`${MLB_BASE}/venues/${venueId}?hydrate=location`);
  const j=await fetchJSON(url);
  return j.venues?.[0] || null;
}

function coordsFromVenue(v){
  const loc=v?.location || {};
  const dc=loc.defaultCoordinates || {};
  const lat=Number(dc.latitude ?? loc.latitude);
  const lon=Number(dc.longitude ?? loc.longitude);
  if(Number.isFinite(lat) && Number.isFinite(lon)) return {lat,lon};
  return null;
}

async function getClimaActual(lat,lon){
  const url=
    "https://api.open-meteo.com/v1/forecast"+
    `?latitude=${lat}&longitude=${lon}`+
    "&current=temperature_2m,relative_humidity_2m,precipitation,wind_speed_10m,wind_direction_10m"+
    "&temperature_unit=fahrenheit&wind_speed_unit=mph";
  const j=await fetchJSON(url);
  const c=j.current || {};
  return {
    tempF:Number(c.temperature_2m),
    humidity:Number(c.relative_humidity_2m),
    precip:Number(c.precipitation),
    windMph:Number(c.wind_speed_10m),
    windDir:Number(c.wind_direction_10m)
  };
}

async function getClimaHistorico(lat,lon,dateISO,gameDate){
  const url=
    "https://archive-api.open-meteo.com/v1/archive"+
    `?latitude=${lat}&longitude=${lon}`+
    `&start_date=${dateISO}&end_date=${dateISO}`+
    "&hourly=temperature_2m,relative_humidity_2m,precipitation,wind_speed_10m,wind_direction_10m"+
    "&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=America/New_York";

  const j=await fetchJSON(url);
  const h=j.hourly || {};
  const times=h.time || [];
  if(!times.length) return null;

  let targetHour=19;
  try{
    const d=new Date(gameDate);
    if(Number.isFinite(d.getHours())) targetHour=d.getHours();
  }catch(e){}

  let best=0;
  let diff=999;

  for(let i=0;i<times.length;i++){
    const hour=Number(String(times[i]).slice(11,13));
    const d=Math.abs(hour-targetHour);
    if(d<diff){
      diff=d;
      best=i;
    }
  }

  return {
    tempF:Number(h.temperature_2m?.[best]),
    humidity:Number(h.relative_humidity_2m?.[best]),
    precip:Number(h.precipitation?.[best]),
    windMph:Number(h.wind_speed_10m?.[best]),
    windDir:Number(h.wind_direction_10m?.[best])
  };
}

function guardarHistoricoCache(rows){
  try{
    localStorage.setItem(CACHE_HIST,JSON.stringify(rows));
  }catch(e){}
}

function leerHistoricoCache(){
  try{
    const raw=localStorage.getItem(CACHE_HIST);
    if(!raw) return [];
    const arr=JSON.parse(raw);
    return Array.isArray(arr) ? arr : [];
  }catch(e){
    return [];
  }
}

function cardJuegoHoy(g,c){
  const away=g.teams?.away?.team?.name || "?";
  const home=g.teams?.home?.team?.name || "?";
  const venue=g.venue?.name || "SIN PARQUE";

  return `
    <div class="juego">
      <div class="matchup">${away} @ ${home}</div>
      <div class="estadio">${venue}</div>
      ${
        c ? `
        <div class="meta">Temp: ${safe(c.tempF)}°F</div>
        <div class="meta">Humedad: ${safe(c.humidity)}%</div>
        <div class="meta">Precip: ${safe(c.precip)}</div>
        <div class="meta">Viento: ${safe(c.windMph)} mph</div>
        <div class="meta">Dir viento: ${Number.isFinite(c.windDir)?c.windDir+"°":"NO CONFIRMADA"}</div>
        <div class="meta">Roof: ${c.roof || "NO CONFIRMADO"}</div>
        ` : `<div class="bad">Clima no confirmado</div>`
      }
    </div>
  `;
}

async function jalarJuegosHoy(){
  try{
    setEstado("Jalando juegos de hoy...");
    render("");

    const games=await scheduleByDate(hoyISO());
    juegosHoy=games;
    climaHoy={};

    let html="";

    for(const g of games){
      const venueId=g.venue?.id;
      let venueFull=null;
      let coords=null;

      if(venueId){
        venueFull=await getVenueFull(venueId);
        coords=coordsFromVenue(venueFull);
      }

      if(coords){
        const clima=await getClimaActual(coords.lat,coords.lon);
        climaHoy[g.gamePk]={
          gamePk:g.gamePk,
          date:hoyISO(),
          away:g.teams?.away?.team?.name || "?",
          home:g.teams?.home?.team?.name || "?",
          venue:g.venue?.name || venueFull?.name || "SIN PARQUE",
          venueId:venueId,
          roof:venueFull?.roofType || venueFull?.roof || "",
          lat:coords.lat,
          lon:coords.lon,
          ...clima
        };
      }

      html+=cardJuegoHoy(g,climaHoy[g.gamePk]);
    }

    render(html || "<div class='bad'>No hay juegos.</div>");
    setEstado("Juegos de hoy cargados.");
  }catch(e){
    setEstado("Error jalando juegos de hoy: "+e.message);
  }
}

async function jalarHistorico2026(){
  try{
    setEstado("Jalando histórico 2026 desde marzo 26...");
    render("<div class='small'>Procesando histórico. Puede tardar.</div>");

    let rows=[];
    const end=ayerISO();
    let d=START_HIST;

    while(d<=end){
      setEstado("Histórico: "+d+" · filas: "+rows.length);

      let games=[];
      try{
        games=await scheduleByDate(d);
      }catch(e){
        d=addDays(d,1);
        continue;
      }

      for(const g of games){
        const status=String(g.status?.detailedState || "").toLowerCase();
        if(status.includes("postponed") || status.includes("cancelled") || status.includes("canceled")){
          continue;
        }

        const venueId=g.venue?.id;
        if(!venueId) continue;

        let venueFull=null;
        let coords=null;

        try{
          venueFull=await getVenueFull(venueId);
          coords=coordsFromVenue(venueFull);
        }catch(e){
          continue;
        }

        if(!coords) continue;

        let clima=null;
        try{
          clima=await getClimaHistorico(coords.lat,coords.lon,d,g.gameDate);
        }catch(e){
          continue;
        }

        if(!clima) continue;

        rows.push({
          gamePk:g.gamePk,
          date:d,
          away:g.teams?.away?.team?.name || "?",
          home:g.teams?.home?.team?.name || "?",
          venue:g.venue?.name || venueFull?.name || "SIN PARQUE",
          venueId:venueId,
          roof:venueFull?.roofType || venueFull?.roof || "",
          lat:coords.lat,
          lon:coords.lon,
          tempF:clima.tempF,
          humidity:clima.humidity,
          precip:clima.precip,
          windMph:clima.windMph,
          windDir:clima.windDir
        });
      }

      d=addDays(d,1);
    }

    historico2026=rows;
    guardarHistoricoCache(rows);

    render(`
      <div class="juego">
        <div class="matchup">Histórico 2026 cargado</div>
        <div class="meta">Filas: ${rows.length}</div>
        <div class="meta">Desde: ${START_HIST}</div>
        <div class="meta">Hasta: ${end}</div>
      </div>
    `);

    setEstado("Histórico cargado: "+rows.length+" filas.");
  }catch(e){
    setEstado("Error histórico: "+e.message);
  }
}

function scoreMatch(today,h){
  let score=0;

  const tempDiff=Math.abs(Number(today.tempF)-Number(h.tempF));
  const windDiff=Math.abs(Number(today.windMph)-Number(h.windMph));
  const humDiff=Math.abs(Number(today.humidity)-Number(h.humidity));
  const precipDiff=Math.abs(Number(today.precip)-Number(h.precip));

  score += Math.max(0,30-tempDiff);
  score += Math.max(0,25-(windDiff*2));
  score += Math.max(0,20-(humDiff/3));
  score += Math.max(0,10-(precipDiff*10));

  if(today.venue && h.venue && today.venue===h.venue) score+=15;

  const td=Number(today.windDir);
  const hd=Number(h.windDir);
  if(Number.isFinite(td) && Number.isFinite(hd)){
    let dd=Math.abs(td-hd);
    if(dd>180) dd=360-dd;
    score += Math.max(0,10-(dd/18));
  }

  return Math.max(0,Math.min(100,Math.round(score)));
}

function calcularCoincidencia(){
  if(!juegosHoy.length){
    setEstado("Primero jala juegos de hoy.");
    return;
  }

  let hist=historico2026.length ? historico2026 : leerHistoricoCache();

  if(!hist.length){
    setEstado("Primero toca JALAR HISTÓRICO 2026.");
    return;
  }

  let html="";

  for(const g of juegosHoy){
    const today=climaHoy[g.gamePk];
    const away=g.teams?.away?.team?.name || "?";
    const home=g.teams?.home?.team?.name || "?";
    const venue=g.venue?.name || "SIN PARQUE";

    if(!today){
      html+=`
        <div class="juego">
          <div class="matchup">${away} @ ${home}</div>
          <div class="estadio">${venue}</div>
          <div class="bad">SIN CLIMA DE HOY</div>
        </div>
      `;
      continue;
    }

    const ranked=hist
      .map(x=>({...x,score:scoreMatch(today,x)}))
      .sort((a,b)=>b.score-a.score)
      .slice(0,5);

    const top=ranked[0];
    const cls=top?.score>=80 ? "ok" : top?.score>=65 ? "mid" : "bad";

    html+=`
      <div class="juego">
        <div class="matchup">${away} @ ${home}</div>
        <div class="estadio">${venue}</div>
        <div class="match">
          Mejor coincidencia: <span class="${cls}">${top ? top.score : 0}%</span>
        </div>
        <div class="hist">
          ${ranked.map(r=>`
            <div class="small">
              ${r.date} · ${r.away} @ ${r.home} · ${r.venue}
              · ${safe(r.tempF)}°F
              · viento ${safe(r.windMph)} mph
              · dir ${Number.isFinite(Number(r.windDir)) ? r.windDir+"°" : "NO"}
              · hum ${safe(r.humidity)}%
              · score ${r.score}%
            </div>
          `).join("")}
        </div>
      </div>
    `;
  }

  render(html);
  setEstado("Coincidencia calculada.");
}

function escenaAbierta(today){
  const roof=String(today?.roof || "").toLowerCase();

  if(roof.includes("closed") || roof.includes("cerrado")) return "NO ABIERTA / ROOF CERRADO";
  if(roof.includes("open") || roof.includes("abierto")) return "ABIERTA / ROOF ABIERTO";

  const venue=String(today?.venue || "").toLowerCase();

  const roofParks=[
    "tropicana field",
    "rogers centre",
    "minute maid park",
    "globe life field",
    "loandepot park",
    "american family field",
    "chase field",
    "t-mobile park"
  ];

  if(roofParks.some(x=>venue.includes(x))){
    return "ROOF NO CONFIRMADO";
  }

  return "ABIERTA";
}

function tipoBrisa(today){
  const mph=Number(today?.windMph || 0);
  const dir=Number(today?.windDir);
  const escena=escenaAbierta(today);

  if(escena.includes("ROOF CERRADO")) return "ROOF CERRADO";
  if(escena.includes("ROOF NO CONFIRMADO")) return "ROOF NO CONFIRMADO";

  if(mph<4) return "MUERTA";

  if(!Number.isFinite(dir)){
    if(mph>=12) return "TURBULENTA / DIRECCIÓN NO CONFIRMADA";
    if(mph>=7) return "ACTIVA / DIRECCIÓN NO CONFIRMADA";
    return "MUERTA / DIRECCIÓN NO CONFIRMADA";
  }

  if(mph>=14) return "TURBULENTA";
  if((dir>=45 && dir<=135) || (dir>=225 && dir<=315)) return "CRUZADA";
  if(mph>=8) return "DIRECTA";
  return "MUERTA";
}

function evaluarMercados(today,pct,histCount){
  const mph=Number(today?.windMph || 0);
  const temp=Number(today?.tempF || 0);
  const hum=Number(today?.humidity || 0);
  const precip=Number(today?.precip || 0);

  const escena=escenaAbierta(today);
  const brisa=tipoBrisa(today);

  let carreras="NO COINCIDENCIA";
  let f5="NO COINCIDENCIA";
  let ponches="NO COINCIDENCIA";
  let veredicto="PASAR / NO COINCIDENCIA";

  const baseFuerte=pct>=80 && histCount>=3;
  const baseMedia=pct>=65 && histCount>=3;

  if(!baseMedia){
    return {escena,brisa,carreras,f5,ponches,veredicto};
  }

  if(escena.includes("ROOF CERRADO")){
    veredicto="MIRAR SOLO MOTOR PRINCIPAL, NO CLIMA";
    return {escena,brisa,carreras,f5,ponches,veredicto};
  }

  if(escena.includes("ROOF NO CONFIRMADO")){
    veredicto="NO FORZAR / ROOF NO CONFIRMADO";
    return {escena,brisa,carreras,f5,ponches,veredicto};
  }

  const calor=temp>=78;
  const frio=temp<=58;
  const vientoFuerte=mph>=10;
  const lluvia=precip>0.05;
  const humedadAlta=hum>=70;

  if(baseFuerte && calor && vientoFuerte && !lluvia){
    carreras="OVER "+pct+"%";
    f5="F5 OVER "+Math.max(65,pct-5)+"%";
    ponches="NO COINCIDENCIA";
    veredicto="MIRAR OVER / F5 OVER";
    return {escena,brisa,carreras,f5,ponches,veredicto};
  }

  if(baseFuerte && frio && vientoFuerte){
    carreras="UNDER "+pct+"%";
    f5="F5 UNDER "+Math.max(65,pct-5)+"%";
    ponches="FAVORABLE A K "+Math.max(60,pct-10)+"%";
    veredicto="MIRAR UNDER / K";
    return {escena,brisa,carreras,f5,ponches,veredicto};
  }

  if(baseFuerte && brisa==="MUERTA"){
    if(humedadAlta){
      carreras="OVER LEVE "+Math.max(60,pct-15)+"%";
      veredicto="MIRAR TOTAL SOLO SI LÍNEA AYUDA";
    }else{
      veredicto="PASAR";
    }
    return {escena,brisa,carreras,f5,ponches,veredicto};
  }

  if(baseMedia){
    veredicto="REVISAR / NO FORZAR";
    return {escena,brisa,carreras,f5,ponches,veredicto};
  }

  return {escena,brisa,carreras,f5,ponches,veredicto};
}

function generarConclusionCoincidencia(){
  if(!juegosHoy.length){
    setEstado("Primero jala juegos de hoy.");
    return;
  }

  let hist=historico2026.length ? historico2026 : leerHistoricoCache();

  if(!hist.length){
    setEstado("Primero toca JALAR HISTÓRICO 2026.");
    return;
  }

  let html="";

  for(const g of juegosHoy){
    const today=climaHoy[g.gamePk];
    const away=g.teams?.away?.team?.name || "?";
    const home=g.teams?.home?.team?.name || "?";
    const matchup=away+" @ "+home;
    const estadio=g.venue?.name || "SIN PARQUE";

    if(!today){
      html+=`
        <div class="juego">
          <div class="matchup">${matchup}</div>
          <div class="estadio">${estadio}</div>
          <div class="bad"><b>NO COINCIDENCIA:</b> SIN CLIMA DE HOY</div>
        </div>
      `;
      continue;
    }

    let ranked=hist
      .map(x=>({...x,score:scoreMatch(today,x)}))
      .sort((a,b)=>b.score-a.score)
      .slice(0,5);

    const mismoParque=ranked.filter(x=>x.venue===today.venue);

    if(mismoParque.length){
      ranked=mismoParque.concat(ranked.filter(x=>x.venue!==today.venue)).slice(0,5);
    }

    const top=ranked[0];
    const pct=top ? Number(top.score || 0) : 0;
    const histCount=ranked.filter(x=>Number(x.score || 0)>=65).length;
    const ev=evaluarMercados(today,pct,histCount);
    const cls=pct>=80 ? "ok" : pct>=65 ? "mid" : "bad";

    html+=`
      <div class="juego">
        <div class="matchup">${matchup}</div>
        <div class="estadio">${estadio}</div>

               <div class="meta"><b>Match clima/parque:</b> <span class="${cls}">${pct}%</span></div>
        <div class="meta"><b>Base histórica útil:</b> ${histCount} juegos similares del mismo parque</div>

        ${window.MLBPRO_ROOF_STATUS ? window.MLBPRO_ROOF_STATUS.renderRoofLine(estadio) : ""}

        <div class="meta"><b>Qué mide:</b> temperatura + viento + dirección + humedad + parque + techo</div>
        <div class="meta"><b>Nota:</b> match alto NO es pick automático</div>

        <div class="meta"><b>Carreras:</b> ${ev.carreras || "SIN DATOS"} — ${
          ev.carreras && ev.carreras.includes("OVER")
            ? "hay señal histórica, revisar línea"
            : "no hay patrón suficiente para jugar total"
        }</div>
        <div class="meta"><b>F5:</b> ${ev.f5 || "SIN DATOS"} — sin base fuerte para F5</div>
        <div class="meta"><b>Ponches:</b> ${ev.ponches || "SIN DATOS"} — faltan pitcher/lineup/umpire/catcher</div>

        <div class="match"><b>Veredicto final:</b> ${ev.veredicto || "NO USAR COMO PICK"}</div> 

        <div class="hist">
          ${ranked.map(r=>`
            <div class="small">
              ${r.date} · ${r.away} @ ${r.home} · ${r.venue}
              · ${safe(r.tempF)}°F
              · viento ${safe(r.windMph)} mph
              · dir ${Number.isFinite(Number(r.windDir)) ? r.windDir+"°" : "NO"}
              · hum ${safe(r.humidity)}%
              · score ${r.score}%
            </div>
          `).join("")}
        </div>
      </div>
    `;
  }

  render(html);
  setEstado("Conclusión de coincidencia generada.");
}

window.addEventListener("load",()=>{
  historico2026=leerHistoricoCache();
  if(historico2026.length){
    setEstado("Listo. Histórico en cache: "+historico2026.length+" filas.");
  }
});
</script>
<script src="roof-status.js"></script>
<script src="confidence-panel.js"></script>
<script src="game-cards.js"></script>
</body>
</html>
