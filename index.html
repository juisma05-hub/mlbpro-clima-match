<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MLBPro · Coincidencia climática</title>
<style>
body{background:#000;color:#e8e8e8;font-family:-apple-system,system-ui,sans-serif;margin:0;padding:16px}
h1{font-size:18px;color:#f5c518;margin:0 0 4px}
.sub{color:#888;font-size:13px;margin-bottom:12px}
button{width:100%;padding:15px;margin:6px 0;font-size:15px;font-weight:800;color:#000;background:#f5c518;border:none;border-radius:12px}
button:disabled{opacity:.5}
#estado{margin:12px 0;font-size:13px;color:#9ad}
.juego{border:1px solid #333;border-radius:12px;padding:14px;margin-bottom:12px;background:#0c0c0c}
.matchup{font-size:16px;font-weight:800;color:#fff}

</style>
<link rel="stylesheet" href="style.css">
<script src="parques-orientacion.js"></script>
</head>

<body>
<h1>MLBPro · Coincidencia climática</h1>
<div class="sub">Data Madre 2026 · Caja de Pandora</div>

<button onclick="jalarJuegosHoy()">JALAR JUEGOS DE HOY</button>
<button onclick="jalarHistorico2026()">JALAR HISTÓRICO 2026</button>
<button onclick="calcularCoincidencia()">CALCULAR COINCIDENCIA</button>
<button onclick="generarConclusionCoincidencia()">CONCLUSIÓN DE COINCIDENCIA</button>

<div id="estado">Listo.</div>
<div id="lista"></div>

<script>
const PROXY="https://mlb-score-proxy.jip0512.workers.dev/?url=";
const MLB_BASE="https://statsapi.mlb.com/api/v1";
const START_HIST="2026-03-26";
const CACHE_HIST="MLBPRO_DATA_MADRE_HIST_2026_V1";

let juegosHoy=[];
let climaHoy={};
let historico2026=[];

function viaProxy(url){
  return PROXY + encodeURIComponent(url);
}

function hoyISO(){
  const d=new Date();
  return d.toISOString().slice(0,10);
}

function ayerISO(){
  const d=new Date();
  d.setDate(d.getDate()-1);
  return d.toISOString().slice(0,10);
}

function addDays(dateISO,n){
  const d=new Date(dateISO+"T12:00:00");
  d.setDate(d.getDate()+n);
  return d.toISOString().slice(0,10);
}

function setEstado(t){
  document.getElementById("estado").textContent=t;
}

function render(html){
  document.getElementById("lista").innerHTML=html;
}

function safe(x){
  return Number.isFinite(Number(x)) ? Number(x) : "NO";
}

async function fetchJSON(url){
  const r=await fetch(url);
  if(!r.ok) throw new Error("HTTP "+r.status);
  return await r.json();
}

async function scheduleByDate(dateISO){
  const url=viaProxy(`${MLB_BASE}/schedule?sportId=1&date=${dateISO}&hydrate=venue`);
  const j=await fetchJSON(url);
  return j.dates?.[0]?.games || [];
}

async function getVenueFull(venueId){
  const url=viaProxy(`${MLB_BASE}/venues/${venueId}?hydrate=location`);
  const j=await fetchJSON(url);
  return j.venues?.[0] || null;
}

function coordsFromVenue(v){
  const loc=v?.location || {};
  const dc=loc.defaultCoordinates || {};
  const lat=Number(dc.latitude ?? loc.latitude);
  const lon=Number(dc.longitude ?? loc.longitude);
  if(Number.isFinite(lat) && Number.isFinite(lon)) return {lat,lon};
  return null;
}

async function getClimaActual(lat,lon){
  const url=
    "https://api.open-meteo.com/v1/forecast"+
    `?latitude=${lat}&longitude=${lon}`+
    "&current=temperature_2m,relative_humidity_2m,precipitation,wind_speed_10m,wind_direction_10m"+
    "&temperature_unit=fahrenheit&wind_speed_unit=mph";
  const j=await fetchJSON(url);
  const c=j.current || {};
  return {
    tempF:Number(c.temperature_2m),
    humidity:Number(c.relative_humidity_2m),
    precip:Number(c.precipitation),
    windMph:Number(c.wind_speed_10m),
    windDir:Number(c.wind_direction_10m)
  };
}

async function getClimaHistorico(lat,lon,dateISO,gameDate){
  const url=
    "https://archive-api.open-meteo.com/v1/archive"+
    `?latitude=${lat}&longitude=${lon}`+
    `&start_date=${dateISO}&end_date=${dateISO}`+
    "&hourly=temperature_2m,relative_humidity_2m,precipitation,wind_speed_10m,wind_direction_10m"+
    "&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=America/New_York";

  const j=await fetchJSON(url);
  const h=j.hourly || {};
  const times=h.time || [];
  if(!times.length) return null;

  let targetHour=19;
  try{
    const d=new Date(gameDate);
    if(Number.isFinite(d.getHours())) targetHour=d.getHours();
  }catch(e){}

  let best=0;
  let diff=999;

  for(let i=0;i<times.length;i++){
    const hour=Number(String(times[i]).slice(11,13));
    const d=Math.abs(hour-targetHour);
    if(d<diff){
      diff=d;
      best=i;
    }
  }

  return {
    tempF:Number(h.temperature_2m?.[best]),
    humidity:Number(h.relative_humidity_2m?.[best]),
    precip:Number(h.precipitation?.[best]),
    windMph:Number(h.wind_speed_10m?.[best]),
    windDir:Number(h.wind_direction_10m?.[best])
  };
}

async function getBoxScore(gamePk){
  const url=viaProxy(`${MLB_BASE}/game/${gamePk}/boxscore`);
  try{
    const j=await fetchJSON(url);
    const teams=j.teams || {};
    const away=teams.away?.teamStats?.batting || {};
    const home=teams.home?.teamStats?.batting || {};
    return {
      awayRuns:Number(away.runs),
      homeRuns:Number(home.runs),
      awayKs:Number(away.strikeOuts),
      homeKs:Number(home.strikeOuts),
      awayHRs:Number(away.homeRuns),
      homeHRs:Number(home.homeRuns)
    };
  }catch(e){
    return {awayRuns:0,homeRuns:0,awayKs:0,homeKs:0,awayHRs:0,homeHRs:0};
  }
}

function guardarHistoricoCache(rows){
  try{
    localStorage.setItem(CACHE_HIST,JSON.stringify(rows));
  }catch(e){}
}

function leerHistoricoCache(){
  try{
    const raw=localStorage.getItem(CACHE_HIST);
    if(!raw) return [];
    const arr=JSON.parse(raw);
    return Array.isArray(arr) ? arr : [];
  }catch(e){
    return [];
  }
}

function cardJuegoHoy(g,c){
  const away=g.teams?.away?.team?.name || "?";
  const home=g.teams?.home?.team?.name || "?";
  const venue=g.venue?.name || "SIN PARQUE";

  return `
    <div class="juego">
      <div class="matchup">${away} @ ${home}</div>
      <div class="estadio">${venue}</div>
      ${
        c ? `
        <div class="meta">Temp: ${safe(c.tempF)}°F</div>
        <div class="meta">Humedad: ${safe(c.humidity)}%</div>
        <div class="meta">Precip: ${safe(c.precip)}</div>
        <div class="meta">Viento: ${safe(c.windMph)} mph</div>
        <div class="meta">Dir viento: ${Number.isFinite(c.windDir)?c.windDir+"°":"NO CONFIRMADA"}</div>
        <div class="meta">Roof: ${c.roof || "NO CONFIRMADO"}</div>
        ` : `<div class="bad">Clima no confirmado</div>`
      }
    </div>
  `;
}

async function jalarJuegosHoy(){
  try{
    setEstado("Jalando juegos de hoy...");
    render("");

    const games=await scheduleByDate(hoyISO());
    juegosHoy=games;
    climaHoy={};

    let html="";

    for(const g of games){
      const venueId=g.venue?.id;
      let venueFull=null;
      let coords=null;

      if(venueId){
        venueFull=await getVenueFull(venueId);
        coords=coordsFromVenue(venueFull);
      }

      if(coords){
        const clima=await getClimaActual(coords.lat,coords.lon);
        climaHoy[g.gamePk]={
          gamePk:g.gamePk,
          date:hoyISO(),
          gameDate:g.gameDate,
          away:g.teams?.away?.team?.name || "?",
          home:g.teams?.home?.team?.name || "?",
          venue:g.venue?.name || venueFull?.name || "SIN PARQUE",
          venueId:venueId,
          roof:venueFull?.roofType || venueFull?.roof || "",
          lat:coords.lat,
          lon:coords.lon,
          ...clima
        };
      }

      html+=cardJuegoHoy(g,climaHoy[g.gamePk]);
    }

    render(html || "<div class='bad'>No hay juegos.</div>");
    setEstado("Juegos de hoy cargados.");
  }catch(e){
    setEstado("Error jalando juegos de hoy: "+e.message);
  }
}

async function jalarHistorico2026(){
  try{
    let rows=leerHistoricoCache();
    const end=ayerISO();

    let d=START_HIST;
    if(rows.length){
      const fechas=rows.map(r=>r.date).filter(Boolean).sort();
      const ultima=fechas[fechas.length-1];
      d=addDays(ultima,1);
    }

    if(d>end){
      historico2026=rows;
      render(`
        <div class="juego">
          <div class="matchup">Histórico 2026 en caché</div>
          <div class="meta">Filas: ${rows.length}</div>
          <div class="meta">Ya está actualizado hasta: ${end}</div>
        </div>
      `);
      setEstado("Listo. Histórico en cache: "+rows.length+" filas.");
      return;
    }

    setEstado("Histórico: "+d+" · filas en caché: "+rows.length);
    render("<div class='small'>Procesando histórico nuevo. Puede tardar.</div>");

    while(d<=end){
      setEstado("Histórico: "+d+" · filas: "+rows.length);

      let games=[];
      try{
        games=await scheduleByDate(d);
      }catch(e){
        d=addDays(d,1);
        continue;
      }

      for(const g of games){
        const status=String(g.status?.detailedState || "").toLowerCase();
        if(status.includes("postponed") || status.includes("cancelled") || status.includes("canceled")){
          continue;
        }

        const venueId=g.venue?.id;
        if(!venueId) continue;

        let venueFull=null;
        let coords=null;

        try{
          venueFull=await getVenueFull(venueId);
          coords=coordsFromVenue(venueFull);
        }catch(e){
          continue;
        }

        if(!coords) continue;

        let clima=null;
        try{
          clima=await getClimaHistorico(coords.lat,coords.lon,d,g.gameDate);
        }catch(e){
          continue;
        }

        if(!clima) continue;

        let box={awayRuns:0,homeRuns:0,awayKs:0,homeKs:0,awayHRs:0,homeHRs:0};
        try{
          box=await getBoxScore(g.gamePk);
        }catch(e){}

        rows.push({
          gamePk:g.gamePk,
          date:d,
          away:g.teams?.away?.team?.name || "?",
          home:g.teams?.home?.team?.name || "?",
          venue:g.venue?.name || venueFull?.name || "SIN PARQUE",
          venueId:venueId,
          roof:venueFull?.roofType || venueFull?.roof || "",
          lat:coords.lat,
          lon:coords.lon,
          tempF:clima.tempF,
          humidity:clima.humidity,
          precip:clima.precip,
          windMph:clima.windMph,
          windDir:clima.windDir,
          awayRuns:box.awayRuns,
          homeRuns:box.homeRuns,
          totalRuns:box.awayRuns+box.homeRuns,
          awayKs:box.awayKs,
          homeKs:box.homeKs,
          totalKs:box.awayKs+box.homeKs,
          awayHRs:box.awayHRs,
          homeHRs:box.homeHRs,
          totalHRs:box.awayHRs+box.homeHRs
        });
      }

      d=addDays(d,1);
    }

    historico2026=rows;
    guardarHistoricoCache(rows);

    render(`
      <div class="juego">
        <div class="matchup">Histórico 2026 actualizado</div>
        <div class="meta">Filas totales: ${rows.length}</div>
        <div class="meta">Desde: ${START_HIST}</div>
        <div class="meta">Hasta: ${end}</div>
      </div>
    `);

    setEstado("Histórico actualizado: "+rows.length+" filas.");
  }catch(e){
    setEstado("Error histórico: "+e.message);
  }
}

function scoreMatch(today,h){
  let score=0;

  const tempDiff=Math.abs(Number(today.tempF)-Number(h.tempF));
  const windDiff=Math.abs(Number(today.windMph)-Number(h.windMph));
  const humDiff=Math.abs(Number(today.humidity)-Number(h.humidity));
  const precipDiff=Math.abs(Number(today.precip)-Number(h.precip));

  score+=Math.max(0,30-tempDiff);
  score+=Math.max(0,25-(windDiff*2));
  score+=Math.max(0,20-(humDiff/3));
  score+=Math.max(0,10-(precipDiff*10));

  if(today.venue && h.venue && today.venue===h.venue) score+=15;

  const td=Number(today.windDir);
  const hd=Number(h.windDir);

  if(Number.isFinite(td) && Number.isFinite(hd)){
    let dd=Math.abs(td-hd);
    if(dd>180) dd=360-dd;
    score+=Math.max(0,10-(dd/18));

    const hpACF=(typeof getOrientacionParque!=='undefined')?getOrientacionParque(today.venue):45;

    const todayBearingDiff=Math.abs(((td-hpACF+360)%360)-180);
    const histBearingDiff=Math.abs(((hd-hpACF+360)%360)-180);

    if(Math.abs(todayBearingDiff-histBearingDiff)<40){
      score+=5;
    }
  }

  return Math.max(0,Math.min(100,Math.round(score)));
}

function calcularCoincidencia(){
  if(!juegosHoy.length){
    setEstado("Primero jala juegos de hoy.");
    return;
  }

  let hist=historico2026.length ? historico2026 : leerHistoricoCache();

  if(!hist.length){
    setEstado("Primero toca JALAR HISTÓRICO 2026.");
    return;
  }

  let html="";

  for(const g of juegosHoy){
    const today=climaHoy[g.gamePk];
    const away=g.teams?.away?.team?.name || "?";
    const home=g.teams?.home?.team?.name || "?";
    const venue=g.venue?.name || "SIN PARQUE";

    if(!today){
      html+=`
        <div class="juego">
          <div class="matchup">${away} @ ${home}</div>
          <div class="estadio">${venue}</div>
          <div class="bad">SIN CLIMA DE HOY</div>
        </div>
      `;
      continue;
    }

    const ranked=hist
      .map(x=>({...x,score:scoreMatch(today,x)}))
      .sort((a,b)=>b.score-a.score)
      .slice(0,5);

    const top=ranked[0];
    const cls=top?.score>=80 ? "ok" : top?.score>=65 ? "mid" : "bad";

    html+=`
      <div class="juego">
        <div class="matchup">${away} @ ${home}</div>
        <div class="estadio">${venue}</div>
        <div class="meta">Fecha: ${today.date || hoyISO()} · Hora: ${horaJuego(today.gameDate)}</div>
        <div class="meta">Temp: ${safe(today.tempF)}°F · Humedad: ${safe(today.humidity)}% · Viento: ${safe(today.windMph)} mph · Dir: ${Number.isFinite(Number(today.windDir)) ? today.windDir+"°" : "SIN DATO"}</div>
        <div class="match">
          Mejor coincidencia: <span class="${cls}">${top ? top.score : 0}%</span>
        </div>
        <details class="hist" style="cursor:pointer">
          <summary style="cursor:pointer;font-weight:800">Similares históricos</summary>
          ${ranked.map(r=>`
            <div class="small">
              ${r.date} · ${r.away} @ ${r.home} · ${r.venue}
              · ${safe(r.tempF)}°F
              · viento ${safe(r.windMph)} mph
              · dir ${Number.isFinite(Number(r.windDir)) ? r.windDir+"°" : "NO"}
              · hum ${safe(r.humidity)}%
              · carreras ${safe(r.totalRuns)}
              · ponches ${safe(r.totalKs)}
              · score ${r.score}%
            </div>
          `).join("")}
        </details>
      </div>
    `;
  }

  render(html);
  setEstado("Coincidencia calculada.");
}

function escenaAbierta(today){
  const roof=String(today?.roof || "").toLowerCase();

  if(roof.includes("closed") || roof.includes("cerrado")) return "NO ABIERTA / ROOF CERRADO";
  if(roof.includes("open") || roof.includes("abierto")) return "ABIERTA / ROOF ABIERTO";

  const venue=String(today?.venue || "").toLowerCase();

  const roofParks=[
    "tropicana field",
    "rogers centre",
    "minute maid park",
    "globe life field",
    "loandepot park",
    "american family field",
    "chase field",
    "t-mobile park"
  ];

  if(roofParks.some(x=>venue.includes(x))){
    return window.MLBPRO_ROOF_STATUS ? window.MLBPRO_ROOF_STATUS.getRoofStatus(today?.venue).label : "NO VERIFICADO";
  }

  return "ABIERTA";
}

function tipoBrisa(today){
  const mph=Number(today?.windMph || 0);
  const dir=Number(today?.windDir);
  const escena=escenaAbierta(today);

  if(escena.includes("ROOF CERRADO")) return "ROOF CERRADO";
  if(escena.includes("ROOF NO CONFIRMADO")) return "ROOF NO CONFIRMADO";

  if(mph<4) return "MUERTA";

  if(!Number.isFinite(dir)){
    if(mph>=12) return "TURBULENTA / DIRECCIÓN NO CONFIRMADA";
    if(mph>=7) return "ACTIVA / DIRECCIÓN NO CONFIRMADA";
    return "MUERTA / DIRECCIÓN NO CONFIRMADA";
  }

  if(mph>=14) return "TURBULENTA";
  if((dir>=45 && dir<=135) || (dir>=225 && dir<=315)) return "CRUZADA";
  if(mph>=8) return "DIRECTA";
  return "MUERTA";
}

function evaluarMercados(today,pct,histCount,ranked){
  const mph=Number(today?.windMph || 0);
  const temp=Number(today?.tempF || 0);
  const hum=Number(today?.humidity || 0);
  const precip=Number(today?.precip || 0);

  const escena=escenaAbierta(today);
  const brisa=tipoBrisa(today);

  let carreras="NO COINCIDENCIA";
  let f5="NO COINCIDENCIA";
  let ponches="NO COINCIDENCIA";
  let veredicto="PASAR / NO COINCIDENCIA";
  let favorece="NO CONFIRMADO";
  let promCarrerasHist=null;
  let promPonchesHist=null;

  const listaValida=Array.isArray(ranked) ? ranked.filter(x=>Number.isFinite(Number(x.totalRuns))) : [];
  if(listaValida.length){
    promCarrerasHist=listaValida.reduce((s,x)=>s+Number(x.totalRuns),0)/listaValida.length;
  }
  const listaPonches=Array.isArray(ranked) ? ranked.filter(x=>Number.isFinite(Number(x.totalKs))) : [];
  if(listaPonches.length){
    promPonchesHist=listaPonches.reduce((s,x)=>s+Number(x.totalKs),0)/listaPonches.length;
  }

  const hpACF=(typeof getOrientacionParque!=='undefined')?getOrientacionParque(today?.venue):null;
  const esFavorableViento=vientoFavorable(today?.windDir, hpACF);

  if(esFavorableViento===null){
    favorece="NO CONFIRMADO / ORIENTACIÓN DE PARQUE SIN DATO";
  }else if(esFavorableViento){
    favorece="BATEO (viento empuja la bola)";
  }else{
    favorece="PICHEO (viento frena la bola)";
  }

  const baseFuerte=pct>=80 && histCount>=3;
  const baseMedia=pct>=65 && histCount>=3;

  if(!baseMedia){
    return {escena,brisa,carreras,f5,ponches,veredicto,favorece,promCarrerasHist,promPonchesHist};
  }

  if(escena.includes("ROOF CERRADO")){
    veredicto="MIRAR SOLO MOTOR PRINCIPAL, NO CLIMA";
    return {escena,brisa,carreras,f5,ponches,veredicto,favorece,promCarrerasHist,promPonchesHist};
  }

  if(escena.includes("ROOF NO CONFIRMADO")){
    veredicto="NO FORZAR / TECHO " + (window.MLBPRO_ROOF_STATUS ? window.MLBPRO_ROOF_STATUS.getRoofStatus(today?.venue).label : "NO VERIFICADO");
    return {escena,brisa,carreras,f5,ponches,veredicto,favorece,promCarrerasHist,promPonchesHist};
  }

  if(promCarrerasHist!==null){
    carreras=promCarrerasHist.toFixed(1)+" carreras prom. ("+listaValida.length+" juego(s) similares)";
  }
  if(promPonchesHist!==null){
    ponches=promPonchesHist.toFixed(1)+" ponches prom. ("+listaPonches.length+" juego(s) similares)";
  }

  if(baseFuerte && esFavorableViento===true){
    veredicto="MIRAR OVER — viento favorece bateo, "+listaValida.length+" similares con "+(promCarrerasHist!==null?promCarrerasHist.toFixed(1):"?")+" carreras prom.";
  }else if(baseFuerte && esFavorableViento===false){
    veredicto="MIRAR UNDER / K — viento favorece picheo, "+listaValida.length+" similares con "+(promCarrerasHist!==null?promCarrerasHist.toFixed(1):"?")+" carreras prom.";
  }else if(baseMedia){
    veredicto="REVISAR / NO FORZAR — "+listaValida.length+" similares con "+(promCarrerasHist!==null?promCarrerasHist.toFixed(1):"?")+" carreras prom.";
  }

  return {escena,brisa,carreras,f5,ponches,veredicto,favorece,promCarrerasHist,promPonchesHist};
}

function vientoFavorable(windDir, hpACF){
  if(hpACF===null || hpACF===undefined || !Number.isFinite(Number(windDir))) return null;
  const opuesto=(hpACF+180)%360;
  let diff=Math.abs(Number(windDir)-opuesto);
  if(diff>180) diff=360-diff;
  return diff<=90;
}

function horaJuego(gameDateISO){
  if(!gameDateISO) return "NO CONFIRMADA";
  try{
    const d=new Date(gameDateISO);
    return d.toLocaleTimeString("es-US",{hour:"2-digit",minute:"2-digit",timeZone:"America/New_York"})+" ET";
  }catch(e){
    return "NO CONFIRMADA";
  }
}

function renderBrujula(today, gamePk){
  const hpACF = (typeof getOrientacionParque !== 'undefined')
    ? getOrientacionParque(today?.venue)
    : 45;

  const windDir = Number(today?.windDir);
  const tieneDir = Number.isFinite(windDir);
  const id = "brujula_" + gamePk;

  const puntos16 = [
    {g:0,t:"N"},{g:22.5,t:"NNE"},{g:45,t:"NE"},{g:67.5,t:"ENE"},
    {g:90,t:"E"},{g:112.5,t:"ESE"},{g:135,t:"SE"},{g:157.5,t:"SSE"},
    {g:180,t:"S"},{g:202.5,t:"SSW"},{g:225,t:"SW"},{g:247.5,t:"WSW"},
    {g:270,t:"W"},{g:292.5,t:"WNW"},{g:315,t:"NW"},{g:337.5,t:"NNW"}
  ];

  const cx=110, cy=110, r=95;
  let marcas = "";
  puntos16.forEach(p=>{
    const gAjustado = ((p.g - hpACF)%360+360)%360;
    const rad = gAjustado * Math.PI/180;
    const esMayor = (p.g % 90 === 0);
    const rTxt = r - (esMayor?16:12);
    const x = cx + rTxt*Math.sin(rad), y = cy - rTxt*Math.cos(rad);
    marcas += `<text x="${x}" y="${y+4}" fill="${esMayor?"#79c0ff":"#8b949e"}" font-size="${esMayor?13:9}" font-weight="${esMayor?800:600}" text-anchor="middle">${p.t}</text>`;
    const p1x = cx + r*Math.sin(rad), p1y = cy - r*Math.cos(rad);
    const p2x = cx + (r-6)*Math.sin(rad), p2y = cy - (r-6)*Math.cos(rad);
    marcas += `<line x1="${p1x}" y1="${p1y}" x2="${p2x}" y2="${p2y}" stroke="${esMayor?"#e6edf3":"#484f58"}" stroke-width="${esMayor?2:1}"/>`;
  });

  const degAjustado = tieneDir ? ((windDir - hpACF)%360+360)%360 : 0;

  // El abanico verde SIEMPRE apunta "arriba" (fijo, no rota) — mismo
  // diseño que el diamante. Para que las flechitas queden SIEMPRE dentro
  // de esa zona, su ángulo de entrada se limita al cono real del abanico
  // (-42° a +42° desde vertical), y solo se decide si vienen "de frente"
  // (entran derecho) o "cruzadas" (entran con inclinación) según qué tan
  // cerca esté degAjustado de 0°/180°. Esto evita que salgan del área
  // verde sin importar la dirección real del viento.
  let anguloEntrada = degAjustado;
  if(anguloEntrada > 180) anguloEntrada -= 360; // rango -180..180
  const maxCono = 40;
  const anguloClamp = Math.max(-maxCono, Math.min(maxCono, anguloEntrada));

  const offsets = [0, -14, 14, -7, 7];
  const radioInicio = 20;
  const radioFin = 62;

  function puntoPolar(radio, gradoOffset){
    const anguloTotal = anguloClamp + gradoOffset*0.4;
    const rad = anguloTotal * Math.PI/180;
    const x = 110 + radio*Math.sin(rad);
    const y = 152 - radio*Math.cos(rad);
    return {x, y};
  }

  let flechitas = "";
  let animaciones = "";
  if(tieneDir){
    offsets.forEach((off, i)=>{
      const n = i+1;
      const ini = puntoPolar(radioInicio, off);
      const fin = puntoPolar(radioFin, off);
      const anguloFlecha = anguloClamp + off*0.4;
      const dur = (1.3 + i*0.08).toFixed(2);
      const delay = (i*0.22).toFixed(2);
      flechitas += `<path class="fviento fv${n}-${id}" d="M0,-4 L4,0 L0,4 L1.5,0 Z" fill="#58a6ff"/>`;
      animaciones += `
        .fv${n}-${id}{ animation: viaje${n}-${id} ${dur}s linear infinite; animation-delay:${delay}s; transform-box: fill-box; transform-origin: center; }
        @keyframes viaje${n}-${id}{
          from{ transform:translate(${ini.x.toFixed(1)}px,${ini.y.toFixed(1)}px) rotate(${anguloFlecha}deg); }
          to{ transform:translate(${fin.x.toFixed(1)}px,${fin.y.toFixed(1)}px) rotate(${anguloFlecha}deg); }
        }
      `;
    });
  }

  const animacionesBloque = tieneDir ? `<style>${animaciones}</style>` : "";

  return `
    <div class="match" style="text-align:center">
      <div class="meta"><b>Brújula del parque</b></div>
      ${animacionesBloque}
      <svg viewBox="0 0 220 220" style="width:150px;height:150px">
        <circle cx="110" cy="110" r="95" fill="#0d1117" stroke="#30363d" stroke-width="2"/>
        <g>${marcas}</g>
        <g>
          <path d="M 110,152 L 65,79 A 60,60 0 0 1 155,79 Z" fill="#1a4d2e" stroke="#2d7a4a" stroke-width="1" opacity="0.9"/>
          <path d="M 89,152 Q 110,128 131,152" fill="none" stroke="#c9a94d" stroke-width="1" opacity="0.8"/>
          <path d="M 83,152 Q 110,119 137,152" fill="none" stroke="#c9a94d" stroke-width="0.7" opacity="0.5"/>
          <polygon points="110,110 128,131 110,152 92,131" stroke="#c9a94d" stroke-width="1.5" fill="none"/>
        </g>
        ${flechitas}
        <circle cx="110" cy="110" r="4" fill="#e6edf3"/>
      </svg>
      <div class="small">
        ${tieneDir ? `Viento de ${windDir}° hacia ${(windDir+180)%360}°` : "SIN DIRECCIÓN CONFIRMADA"}
      </div>
    </div>
  `;
}

function generarConclusionCoincidencia(){
  if(!juegosHoy.length){
    setEstado("Primero jala juegos de hoy.");
    return;
  }

  let hist=historico2026.length ? historico2026 : leerHistoricoCache();

  if(!hist.length){
    setEstado("Primero toca JALAR HISTÓRICO 2026.");
    return;
  }

  let html="";

  for(const g of juegosHoy){
    const today=climaHoy[g.gamePk];
    const away=g.teams?.away?.team?.name || "?";
    const home=g.teams?.home?.team?.name || "?";
    const matchup=away+" @ "+home;
    const estadio=g.venue?.name || "SIN PARQUE";

    if(!today){
      html+=`
        <div class="juego">
          <div class="matchup">${matchup}</div>
          <div class="estadio">${estadio}</div>
          <div class="bad"><b>NO COINCIDENCIA:</b> SIN CLIMA DE HOY</div>
        </div>
      `;
      continue;
    }

    let ranked=hist
      .map(x=>({...x,score:scoreMatch(today,x)}))
      .sort((a,b)=>b.score-a.score)
      .slice(0,5);

    const mismoParque=ranked.filter(x=>x.venue===today.venue);

    if(mismoParque.length){
      ranked=mismoParque.concat(ranked.filter(x=>x.venue!==today.venue)).slice(0,5);
    }

    const top=ranked[0];
    const pct=top ? Number(top.score || 0) : 0;
    const histCount=ranked.filter(x=>Number(x.score || 0)>=65).length;
    const ev=evaluarMercados(today,pct,histCount,ranked);
    const cls=pct>=80 ? "ok" : pct>=65 ? "mid" : "bad";

    html+=`
    <div class="juego">
      <div class="matchup">${matchup}</div>
      <div class="estadio">${estadio}</div>
      <div class="meta">Fecha: ${today.date || hoyISO()} · Hora: ${horaJuego(today.gameDate)}</div>

      <div class="meta"><b>Clima de hoy:</b></div>
      <div class="meta">Temp: ${safe(today.tempF)}°F</div>
      <div class="meta">Humedad: ${safe(today.humidity)}%</div>
      <div class="meta">Precip: ${safe(today.precip)}%</div>
      <div class="meta">Viento: ${safe(today.windMph)} mph</div>
      <div class="meta">Dir viento: ${Number.isFinite(Number(today.windDir)) ? today.windDir+"°" : "SIN DATO"}</div>

      ${window.MLBPRO_ROOF_STATUS ? window.MLBPRO_ROOF_STATUS.renderRoofLine(estadio) : ""}

      ${renderBrujula(today, g.gamePk)}

      <details class="match" style="cursor:pointer">
        <summary style="cursor:pointer;font-weight:800"><b>Coincidencia clima/parque:</b> <span class="${cls}">${pct}%</span></summary>
        <div class="meta" style="margin-top:8px"><b>Base histórica útil:</b> ${histCount} juegos similares del mismo parque</div>
        <div class="meta"><b>Qué mide:</b> temperatura + viento + dirección + humedad + parque + techo</div>
        <div class="meta"><b>Brisa favorece:</b> ${ev.favorece}</div>
        <div class="meta"><b>Lectura carreras:</b> ${ev.carreras || "SIN DATOS"}</div>
        <div class="meta"><b>F5:</b> ${ev.f5 || "SIN DATOS"} — sin base fuerte para F5</div>
        <div class="meta"><b>Ponches:</b> ${ev.ponches || "SIN DATOS"}</div>
      </details>

      <div class="match"><b>Conclusión Data Madre:</b> ${
        String(ev.veredicto || "NO USAR COMO PICK")
          .replaceAll("ROOF NO CONFIRMADO", "TECHO " + (window.MLBPRO_ROOF_STATUS ? window.MLBPRO_ROOF_STATUS.getRoofStatus(estadio).label : "NO VERIFICADO"))
      }</div>

      <details class="hist" style="cursor:pointer">
        <summary style="cursor:pointer;font-weight:800">Similares históricos</summary>
        ${ranked.map((r,i)=>`
      <div class="small" style="padding:10px 0;border-bottom:1px solid #222;">
        <div><b>${i+1}. ${r.date}</b></div>
        <div><b>Juego:</b> ${r.away} @ ${r.home}</div>
        <div><b>Parque:</b> ${r.venue}</div>
        <div><b>Clima:</b> ${safe(r.tempF)}°F · viento ${safe(r.windMph)} mph · dir ${Number.isFinite(Number(r.windDir)) ? r.windDir+"°" : "NO"} · hum ${safe(r.humidity)}%</div>
        <div><b>Carreras:</b> ${safe(r.totalRuns)}</div>
        <div><b>Ponches:</b> ${safe(r.totalKs)}</div>
        <div><b>HRs:</b> ${safe(r.totalHRs)}</div>
        <div><b>Score similitud:</b> ${r.score}%</div>
      </div>
    `).join("")}
      </details>
    </div>
  `;
  }

  render(html);
  setEstado("Conclusión de coincidencia generada.");
}

window.addEventListener("load",()=>{
  historico2026=leerHistoricoCache();
  if(historico2026.length){
    setEstado("Listo. Histórico en cache: "+historico2026.length+" filas.");
  }
});
