<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MLBPro · Viento por Parque</title>
<style>
* { box-sizing: border-box; }
body { background:#000; color:#e8e8e8; font-family:-apple-system,system-ui,sans-serif; margin:0; padding:16px; }
h1 { font-size:18px; color:#f5c518; margin:0 0 4px; font-weight:900; }
.sub { color:#888; font-size:13px; margin-bottom:12px; }
button { width:100%; padding:15px; margin:6px 0; font-size:15px; font-weight:800; color:#000; background:#f5c518; border:none; border-radius:12px; cursor:pointer; }
button:active { transform:scale(0.99); }
#estado { margin:12px 0; font-size:13px; color:#9ad; font-weight:700; }
.parque-item { background:#0c0c0c; border:1px solid #333; border-radius:12px; padding:14px; margin:10px 0; cursor:pointer; transition:all 0.2s; }
.parque-item:hover { border-color:#f5c518; background:#151515; }
.parque-nombre { font-size:15px; font-weight:800; color:#fff; margin-bottom:6px; }
.parque-matchup { font-size:13px; color:#bbb; margin-bottom:8px; }
.parque-clima { display:flex; flex-wrap:wrap; gap:8px; font-size:12px; color:#999; }
.parque-viento { font-size:16px; color:#f5c518; font-weight:800; }
.modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:9999; overflow-y:auto; padding:16px; display:none; }
.modal.open { display:block; }
.modal-content { max-width:600px; margin:0 auto; background:#0c0c0c; border:1px solid #333; border-radius:16px; padding:20px; }
.modal-header { color:#f5c518; font-size:18px; font-weight:800; margin:0 0 10px; }
.modal-subheader { color:#888; font-size:13px; margin-bottom:16px; }
.modal-section { background:#111; border:1px solid #333; border-radius:12px; padding:16px; margin-bottom:16px; }
.modal-section-title { color:#f5c518; font-size:14px; font-weight:800; margin-bottom:10px; }
.wind-display { color:#fff; font-size:24px; font-weight:900; margin-bottom:8px; }
.wind-direction { color:#ddd; font-size:13px; margin-bottom:8px; }
.wind-effect { color:#9ad; font-size:13px; margin-bottom:8px; font-weight:800; }
.wind-range { color:#f5c518; font-size:13px; font-weight:800; }
.historico-item { padding:10px 0; border-bottom:1px solid #222; font-size:12px; }
.historico-date { color:#fff; font-weight:800; margin-bottom:4px; }
.historico-venue { color:#ddd; margin-bottom:4px; }
.historico-clima { color:#ddd; margin-bottom:4px; }
.historico-stats { color:#ddd; margin-bottom:4px; }
.historico-score { color:#9ad; font-weight:800; }
.sin-historicos { color:#888; font-size:13px; padding:10px 0; }
.close-btn { width:100%; padding:12px; margin-bottom:16px; background:#333; color:#fff; border:none; border-radius:8px; cursor:pointer; font-weight:800; }
.close-btn:active { transform:scale(0.99); }
#lista { min-height:100px; }
</style>
</head>

<body>
<h1>MLBPro · Viento por Parque</h1>
<div class="sub">Análisis de viento EN VIVO vs histórico 2026</div>

<button onclick="jalarJuegosHoyViento()">JALAR JUEGOS HOY</button>

<div id="estado">Listo.</div>
<div id="lista"></div>

<div id="modalViento" class="modal">
  <div class="modal-content">
    <button class="close-btn" onclick="cerrarModalViento()">CERRAR</button>
    <div id="modalBody"></div>
  </div>
</div>

<script src="parques-orientacion.js"></script>
<script src="mlbpro-core.js"></script>
<script src="roof-status.js"></script>
<script src="mlbpro-viento.js"></script>

<script>
/* ============================================================
   PRÓLOGO — viento-parque.html (script inline)
   ============================================================
   QUÉ ES:
     Pantalla secundaria enfocada solo en viento: lista los juegos de
     hoy con su rango de viento, y al tocar uno abre un modal con
     históricos similares filtrados por ESE rango de mph (no por
     score general como en index.html).

   ORDEN DE CARGA (no cambiar):
     1. parques-orientacion.js
     2. mlbpro-core.js
     3. roof-status.js
     4. mlbpro-viento.js
     5. este script inline

   RELACIÓN CON index.html:
     Comparten CACHE_HIST (vía CORE.leerHistoricoCache()) — esta
     pantalla NO construye histórico propio, solo LEE el que ya armó
     index.html con "JALAR HISTÓRICO 2026". Si acá el modal dice "Sin
     histórico en cache", hay que ir primero a index.html.
     Comparte VIENTO.scoreMatch() y VIENTO.evaluarViento() con
     index.html — mismo viento, mismo parque, siempre da el mismo
     resultado en las dos pantallas (antes no era así: esta pantalla
     tenía su propia copia de scoreMatch y sus propias bandas de
     "cruzada/directa" con números distintos a los de index.html).

   ESTADO GLOBAL:
     juegosHoy → array crudo de MLB Stats API de hoy.
     climaHoy  → objeto {gamePk: {tempF,windMph,windDir,venue,...}}.

   BOTÓN → FUNCIÓN:
     "JALAR JUEGOS HOY" → jalarJuegosHoyViento()
       Llena juegosHoy/climaHoy y pinta un item clickeable por juego.

   FUNCIONES CLAVE:
     getRangoViento(windMph) → {rango, min, max}. Bucket de mph para
       filtrar históricos parecidos (5-8 / 8-12 / 13-16 / 16+).
     evaluarVientoParque(game, venueName) → string categoría. Wrapper
       fino sobre VIENTO.evaluarViento() — existe solo para no tener
       que pasar hpACF a mano en cada llamada de este archivo.
     abrirModalViento(gamePk, venueName) → void. Lee climaHoy[gamePk],
       filtra CORE.leerHistoricoCache() por rango de viento, calcula
       score con VIENTO.scoreMatch(), pinta el modal. Si no hay
       histórico en cache, avisa con alert() y no hace nada más.

   QUÉ TOCA:
     DOM: #estado, #lista, #modalViento, #modalBody. localStorage:
     solo LECTURA, vía CORE.leerHistoricoCache() (nunca escribe acá).
   ============================================================ */
const CORE = window.MLBPRO_CORE;
const VIENTO = window.MLBPRO_VIENTO;

let juegosHoy = [];
let climaHoy = {};

function setEstado(t) { document.getElementById("estado").textContent = t; }
function render(html) { document.getElementById("lista").innerHTML = html; }
function safe(x) { return Number.isFinite(Number(x)) ? Number(x) : "NO"; }

function getRangoViento(windMph) {
  const mph = Number(windMph || 0);
  if (mph >= 16) return { rango: "16+", min: 16, max: 999 };
  if (mph >= 13) return { rango: "13-16", min: 13, max: 16 };
  if (mph >= 8) return { rango: "8-12", min: 8, max: 12 };
  return { rango: "5-8", min: 5, max: 8 };
}

// Wrapper de compatibilidad: usa la misma lógica de mlbpro-viento.js
// que usa index.html, para que las dos pantallas den siempre el mismo
// veredicto para el mismo viento en el mismo parque.
function evaluarVientoParque(game, venueName) {
  const hpACF = (typeof getOrientacionParque !== "undefined") ? getOrientacionParque(venueName) : 45;
  const ev = VIENTO.evaluarViento(game.windDir, hpACF);
  return ev.categoria;
}

async function jalarJuegosHoyViento() {
  try {
    setEstado("Jalando juegos de hoy...");
    render("");

    const games = await CORE.scheduleByDate(CORE.hoyISO());
    juegosHoy = games;
    climaHoy = {};

    let html = "";

    for (const g of games) {
      const venueId = g.venue?.id;
      let venueFull = null, coords = null;

      if (venueId) {
        venueFull = await CORE.getVenueFull(venueId);
        coords = CORE.coordsFromVenue(venueFull);
      }

      if (coords) {
        const clima = await CORE.getClimaActual(coords.lat, coords.lon);
        climaHoy[g.gamePk] = {
          gamePk: g.gamePk,
          date: CORE.hoyISO(),
          away: g.teams?.away?.team?.name || "?",
          home: g.teams?.home?.team?.name || "?",
          venue: g.venue?.name || venueFull?.name || "SIN PARQUE",
          venueId: venueId,
          lat: coords.lat,
          lon: coords.lon,
          ...clima
        };

        const rango = getRangoViento(clima.windMph);
        const venueName = g.venue?.name || venueFull?.name || "SIN PARQUE";
        const efecto = evaluarVientoParque(climaHoy[g.gamePk], venueName);

        html += `
          <div class="parque-item" onclick="abrirModalViento(${g.gamePk}, '${venueName.replace(/'/g, "\\'")}')">
            <div class="parque-nombre">${venueName}</div>
            <div class="parque-matchup">${climaHoy[g.gamePk].away} @ ${climaHoy[g.gamePk].home}</div>
            <div class="parque-clima">
              <span>Temp: ${safe(clima.tempF)}°F</span>
              <span>Hum: ${safe(clima.humidity)}%</span>
              <span class="parque-viento">Viento: ${safe(clima.windMph)} mph (${rango.rango})</span>
            </div>
            <div class="parque-clima" style="color: #9ad; margin-top: 6px;">${efecto}</div>
          </div>
        `;
      }
    }

    render(html || "<div style='color: #888;'>No hay juegos hoy.</div>");
    setEstado("Juegos de hoy cargados: " + Object.keys(climaHoy).length);
  } catch (e) {
    setEstado("Error: " + e.message);
  }
}

function abrirModalViento(gamePk, venueName) {
  const game = climaHoy[gamePk];
  if (!game) { alert("Sin clima confirmado."); return; }

  let hist = CORE.leerHistoricoCache();
  if (!hist.length) { alert("Sin histórico en cache. Jala primero desde index.html."); return; }

  const windMph = Number(game.windMph || 0);
  const rango = getRangoViento(windMph);
  const windDir = Number(game.windDir || 0);
  const efecto = evaluarVientoParque(game, venueName);

  const similares = hist
    .filter(h => { const hwind = Number(h.windMph || 0); return hwind >= rango.min && hwind <= rango.max; })
    .map(h => ({ ...h, score: VIENTO.scoreMatch(game, h) }))
    .sort((a, b) => b.score - a.score)
    .slice(0, 10);

  let modalBody = `
    <div class="modal-header">${venueName}</div>
    <div class="modal-subheader">${game.away} @ ${game.home} · ${game.date}</div>

    <div class="modal-section">
      <div class="modal-section-title">VIENTO ACTUAL</div>
      <div class="wind-display">${windMph.toFixed(1)} mph</div>
      <div class="wind-direction">Dirección: ${Number.isFinite(windDir) ? windDir + "°" : "SIN DATO"}</div>
      <div class="wind-effect">${efecto}</div>
      <div class="wind-range">Rango: ${rango.rango} mph</div>
    </div>

    <div class="modal-section">
      <div class="modal-section-title">CLIMA ACTUAL</div>
      <div style="font-size: 13px; color: #ddd;">
        <div>Temperatura: ${safe(game.tempF)}°F</div>
        <div>Humedad: ${safe(game.humidity)}%</div>
        <div>Precipitación: ${safe(game.precip)}%</div>
      </div>
    </div>

    <div class="modal-section">
      <div class="modal-section-title">HISTÓRICOS SIMILARES (${rango.rango} mph)</div>
      ${similares.length ? similares.map((h, i) => `
        <div class="historico-item">
          <div class="historico-date">${i + 1}. ${h.date} · ${h.away} @ ${h.home}</div>
          <div class="historico-venue">Parque: ${h.venue}</div>
          <div class="historico-clima">
            ${Number(h.tempF).toFixed(1)}°F · ${Number(h.windMph).toFixed(1)} mph (${Number(h.windDir || 0).toFixed(0)}°) · ${Number(h.humidity).toFixed(0)}% hum
          </div>
          <div class="historico-stats">
            Carreras: ${Number(h.totalRuns || 0)} · Ponches: ${Number(h.totalKs || 0)} · HRs: ${Number(h.totalHRs || 0)}
          </div>
          <div class="historico-score">Similitud: ${h.score}%</div>
        </div>
      `).join("") : `<div class="sin-historicos">Sin históricos en este rango.</div>`}
    </div>
  `;

  document.getElementById("modalBody").innerHTML = modalBody;
  document.getElementById("modalViento").classList.add("open");
}

function cerrarModalViento() {
  document.getElementById("modalViento").classList.remove("open");
}

window.addEventListener("load", () => {
  const hist = CORE.leerHistoricoCache();
  if (hist.length) setEstado("Listo. Histórico en cache: " + hist.length + " filas.");
});
</script>
</body>
</html>
