<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MLBPro · Auditoría Timezones Histórico</title>

<style>
:root {
  color-scheme: dark;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  padding: 16px;
  background: #0d1117;
  color: #e6edf3;
  font-family: -apple-system, system-ui, sans-serif;
}

h1 {
  font-size: 18px;
  margin: 0 0 4px;
  color: #79c0ff;
}

.sub {
  font-size: 12px;
  color: #8b949e;
  margin-bottom: 14px;
}

button {
  width: 100%;
  padding: 14px;
  border: 0;
  border-radius: 10px;
  background: #1f6feb;
  color: #fff;
  font-size: 15px;
  font-weight: 800;
  margin-bottom: 14px;
}

#estado {
  font-size: 13px;
  color: #9ad;
  margin-bottom: 12px;
}

.grid {
  display: grid;
  gap: 12px;
}

.card {
  border: 1px solid #30363d;
  background: #161b22;
  border-radius: 12px;
  padding: 14px;
}

.zona {
  font-size: 11px;
  color: #8b949e;
  text-transform: uppercase;
}

.parque {
  font-size: 17px;
  font-weight: 800;
  margin: 4px 0;
}

.matchup {
  font-size: 13px;
  color: #c9d1d9;
  margin-bottom: 8px;
}

.linea {
  font-size: 13px;
  margin: 4px 0;
}

.ok {
  color: #3fb950;
  font-weight: 800;
}

.bad {
  color: #f85149;
  font-weight: 800;
}
</style>
</head>

<body>

<h1>MLBPro · Auditoría de timezones</h1>

<div class="sub">
  Solo lectura. No hace fetch ni modifica caché.
</div>

<button id="btn">
  LEER HISTÓRICO Y AUDITAR
</button>

<div id="estado">Listo.</div>

<div id="salida" class="grid"></div>

<script src="estadios.js"></script>
<script src="mlbpro-core.js"></script>

<script>
(function () {
  "use strict";

  var btn = document.getElementById("btn");
  var estado = document.getElementById("estado");
  var salida = document.getElementById("salida");

  var zonas = [
    {
      nombre: "Este",
      tz: [
        "America/New_York",
        "America/Toronto",
        "America/Detroit"
      ]
    },
    {
      nombre: "Central",
      tz: [
        "America/Chicago",
        "America/Mexico_City"
      ]
    },
    {
      nombre: "Mountain / Phoenix",
      tz: [
        "America/Denver",
        "America/Phoenix"
      ]
    },
    {
      nombre: "Pacífico",
      tz: [
        "America/Los_Angeles"
      ]
    }
  ];

  function esc(v) {
    return String(v === null || v === undefined ? "" : v)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  function real(v) {
    if (v === null || v === undefined || v === "") return false;
    if (typeof v === "boolean") return false;
    if (typeof v === "string" && v.trim() === "") return false;

    return Number.isFinite(Number(v));
  }

  function card(zona, fila) {
    if (!fila) {
      return (
        '<div class="card">' +
          '<div class="zona">' + esc(zona.nombre) + '</div>' +
          '<div class="bad">SIN FILA CONFIRMADA</div>' +
        '</div>'
      );
    }

    var pass =
      !!fila.timezoneUsado &&
      real(fila.horaLocalObjetivo) &&
      !!fila.horaClimaUtilizada;

    return (
      '<div class="card">' +

        '<div class="zona">' +
          esc(zona.nombre) +
        '</div>' +

        '<div class="parque">' +
          esc(fila.venue || "SIN PARQUE") +
        '</div>' +

        '<div class="matchup">' +
          esc((fila.away || "?") + " @ " + (fila.home || "?")) +
        '</div>' +

        '<div class="linea"><b>Fecha:</b> ' +
          esc(fila.date || "NO") +
        '</div>' +

        '<div class="linea"><b>Timezone:</b> ' +
          esc(fila.timezoneUsado || "NO_CONFIRMADO") +
        '</div>' +

        '<div class="linea"><b>Hora local objetivo:</b> ' +
          esc(
            real(fila.horaLocalObjetivo)
              ? fila.horaLocalObjetivo
              : "NO_CONFIRMADO"
          ) +
        '</div>' +

        '<div class="linea"><b>Hora clima usada:</b> ' +
          esc(fila.horaClimaUtilizada || "NO_CONFIRMADO") +
        '</div>' +

        '<div class="linea"><b>Dirección:</b> ' +
          esc(
            real(fila.windDir)
              ? fila.windDir + "°"
              : "NO_CONFIRMADA"
          ) +
        '</div>' +

        '<div class="linea"><b>Velocidad:</b> ' +
          esc(
            real(fila.windMph)
              ? fila.windMph + " mph"
              : "NO_CONFIRMADA"
          ) +
        '</div>' +

        '<div class="linea"><b>Resultado:</b> ' +
          '<span class="' + (pass ? "ok" : "bad") + '">' +
            (pass ? "PASS" : "REVISAR") +
          '</span>' +
        '</div>' +

      '</div>'
    );
  }

  function auditar() {
    salida.innerHTML = "";

    if (
      !window.MLBPRO_CORE ||
      typeof window.MLBPRO_CORE.leerHistoricoCache !== "function"
    ) {
      estado.textContent = "ERROR: MLBPRO_CORE no cargó.";
      return;
    }

    var hist = window.MLBPRO_CORE.leerHistoricoCache() || [];

    if (!Array.isArray(hist) || !hist.length) {
      estado.textContent = "No hay histórico en caché.";
      return;
    }

    var html = "";
    var encontrados = 0;

    zonas.forEach(function (zona) {
      var fila = hist.find(function (r) {
        return (
          r &&
          zona.tz.indexOf(r.timezoneUsado) !== -1 &&
          r.horaClimaUtilizada &&
          real(r.horaLocalObjetivo)
        );
      }) || null;

      if (fila) encontrados++;

      html += card(zona, fila);
    });

    salida.innerHTML = html;

    estado.textContent =
      "Histórico leído: " +
      hist.length +
      " filas · zonas encontradas: " +
      encontrados +
      " de 4.";
  }

  btn.addEventListener("click", auditar);
  window.addEventListener("load", auditar);

})();
</script>

</body>
</html>
